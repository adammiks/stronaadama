<h1>Z krajobrazów poety</h1>

<div class="poem">
<h2>WSTAJĘ, SIÓDMA RANO</h2>

Krzywa wieża naczyń<br>
rama palników gazu<br>
samoobsługowa płaszczyzna stół–ściana<br>
Próbuję uwolnić świat<br>
parujący czajnik<br>
koronki zasłon<br>
obłoki zza mokrej szyby<br>
Jedyna chwila jakiejkolwiek<br>
poezji<br>
W kuchni o siódmej rano<br>
tuż przed śniadaniem

</div>
