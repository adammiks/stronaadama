<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteka Adama Miksa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Serif+4:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f3ec;
      --paper: #fffdf9;
      --text: #26231f;
      --muted: #6f685e;
      --olive: #5f6432;
      --border: #ddd4c7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Serif 4', serif;
      line-height: 1.7;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1280px, 92%);
      margin: 0 auto;
    }

    /* HEADER */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247, 243, 236, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-circle {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 2px solid #7f7b72;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-family: 'Cormorant Garamond', serif;
    }

    .logo-text h1 {
      font-size: 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }

    .logo-text p {
      color: var(--muted);
      font-size: 1rem;
    }

    nav {
      display: flex;
      gap: 48px;
      align-items: center;
    }

    nav a {
      font-size: 1.1rem;
      transition: opacity 0.2s ease;
    }

    nav a:hover {
      opacity: 0.6;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    /* HERO */

    .hero {
      padding: 90px 0 70px;
      border-bottom: 1px solid var(--border);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-subtitle {
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #74705e;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .hero h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem;
      line-height: 0.92;
      font-weight: 600;
      margin-bottom: 34px;
    }

    .hero p {
      font-size: 1.45rem;
      max-width: 560px;
      color: #433f39;
      margin-bottom: 36px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--olive);
      color: white;
      padding: 18px 30px;
      border-radius: 10px;
      font-size: 1.1rem;
      transition: all 0.25s ease;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.1);
    }

    .hero-image {
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.08);
    }

    .hero-image img {
      height: 100%;
      object-fit: cover;
    }

    /* BOOKS */

    .books {
      padding: 80px 0;
      border-bottom: 1px solid var(--border);
    }

    .section-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 46px;
    }

    .section-label {
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #74705e;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.4rem;
      font-weight: 600;
    }

    .all-link {
      font-size: 1.1rem;
      color: #534f45;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 24px;
    }

    .book-card {
      transition: all 0.3s ease;
    }

    .book-card:hover {
      transform: translateY(-8px);
    }

    .book-cover {
      aspect-ratio: 0.7;
      border-radius: 12px;
      padding: 22px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      box-shadow: 0 14px 30px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .book-cover h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      line-height: 1.1;
      font-weight: 600;
    }

    .cover-1 { background: #ebe6d7; }
    .cover-2 { background: #bfc09c; }
    .cover-3 { background: #e8dfcf; }
    .cover-4 { background: #eadfca; }
    .cover-5 { background: #b6c0c7; }
    .cover-6 { background: #c79f6f; }

    .book-title {
      font-size: 1.4rem;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .book-type {
      color: var(--muted);
    }

    /* QUOTE */

    .quote {
      padding: 90px 0;
      border-bottom: 1px solid var(--border);
    }

    .quote-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 50px;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-style: italic;
      color: #4f5631;
      max-width: 850px;
    }

    .quote-image {
      width: 280px;
      opacity: 0.95;
    }

    /* AUTHOR */

    .author {
      padding: 90px 0;
    }

    .author-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
    }

    .author-card {
      display: flex;
      gap: 30px;
    }

    .author-image {
      width: 220px;
      height: 280px;
      border-radius: 14px;
      object-fit: cover;
      filter: grayscale(100%);
    }

    .author-content h3,
    .newsletter h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      margin-bottom: 24px;
    }

    .author-content p,
    .newsletter p {
      font-size: 1.15rem;
      color: #4b4842;
      margin-bottom: 18px;
    }

    .read-more {
      margin-top: 20px;
      display: inline-block;
      color: #4f5631;
      font-size: 1.1rem;
    }

    .newsletter {
      border-left: 1px solid var(--border);
      padding-left: 50px;
    }

    .newsletter-form {
      display: flex;
      margin-top: 26px;
      gap: 14px;
    }

    .newsletter input {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--paper);
      border-radius: 10px;
      padding: 18px;
      font-size: 1rem;
      outline: none;
    }

    .newsletter button {
      background: var(--olive);
      border: none;
      color: white;
      padding: 18px 28px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    /* FOOTER */

    footer {
      border-top: 1px solid var(--border);
      padding: 36px 0;
    }

    .footer-grid {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .footer-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid #7f7b72;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
    }

    .footer-nav {
      display: flex;
      gap: 30px;
    }

    .footer-note {
      color: var(--muted);
    }

    /* RESPONSIVE */

    @media (max-width: 1200px) {
      .books-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .hero h2 {
        font-size: 4.8rem;
      }
    }

    @media (max-width: 900px) {
      nav {
        display: none;
      }
 
      .hero-grid,
      .author-grid,
      .quote-box {
        grid-template-columns: 1fr;
        display: grid;
      }

      .newsletter {
        border-left: none;
        padding-left: 0;
      }

      .hero h2 {
        font-size: 4rem;
      }

      .books-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .books-grid {
        grid-template-columns: 1fr;
      }

      .hero h2 {
        font-size: 3rem;
      }

      .section-title,
      .author-content h3,
      .newsletter h3 {
        font-size: 2.5rem;
      }

      .author-card {
        flex-direction: column;
      }

      .newsletter-form {
        flex-direction: column;
      }
    }
  </style>
