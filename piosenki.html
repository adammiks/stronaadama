<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Piosenki</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .song {
      margin-bottom: 30px;
    }

    iframe {
      width: 100%;
      height: 315px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎵 Moje Piosenki</h1>
</header>



<div class="container">

  <div class="song">
    <h2>Utwór 1</h2>
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      title="YouTube video player" frameborder="0" allowfullscreen>
    </iframe>
  </div>

  <div class="song">
    <h2>Utwór 2</h2>
    <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ" 
      title="YouTube video player" frameborder="0" allowfullscreen>
    </iframe>
  </div>

</div>

</body>
</html>
